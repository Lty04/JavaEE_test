# 数据库配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ai_learning_platform?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
spring.datasource.username=root
spring.datasource.password=root123

# HikariCP连接池配置
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# AI服务配置
ai.enabled=true
ai.mode=mock
ai.api.url=https://api.openai.com/v1/chat/completions
ai.api.key=${OPENAI_API_KEY:}
ai.timeout=30000

# 文件上传配置
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload.path=/tmp/uploads

# 日志配置
logging.level.root=INFO
logging.level.com.ai.learning=DEBUG
logging.file.name=logs/ai-learning-platform.log

# 服务器配置（开发环境）
server.port=8080
server.servlet.context-path=/

# 积分规则配置
points.complete-help=20
points.resource-favorited=5
points.quality-resource=30
points.cancel-reservation=-10
points.malicious-submit=-20
