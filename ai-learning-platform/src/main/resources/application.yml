server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: ai-learning-platform
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_learning_platform?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password: root123
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

# AI服务配置
ai:
  enabled: true
  mode: mock  # mock 或 real
  api:
    url: https://api.openai.com/v1/chat/completions
    key: ${OPENAI_API_KEY:}
    timeout: 30000

# 文件上传路径
file:
  upload:
    path: /tmp/uploads

# JWT配置
jwt:
  secret: ${JWT_SECRET:your-secret-key-change-in-production}
  expiration: 86400000  # 24小时

# 积分规则配置
points:
  complete-help: 20
  resource-favorited: 5
  quality-resource: 30
  cancel-reservation: -10
  malicious-submit: -20

# 日志配置
logging:
  level:
    root: INFO
    com.ai.learning: DEBUG
    org.springframework.security: DEBUG
  file:
    name: logs/ai-learning-platform.log
